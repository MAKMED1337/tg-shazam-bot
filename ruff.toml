line-length = 120
target-version = "py312"
fix = true

[format]
quote-style = "single"

[lint]
select = ["ALL"]
ignore = [
    "D",
    "COM812",
    "EM101",
    "TRY003",
    "E741",
    "ANN204",
    "TD",
    "ISC001", # ruff format requires this
    "TRY300",
]

fixable = ["ALL"]
unfixable = []

dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
"tests/**" = ["S101"]

[lint.pylint]
max-args = 8

[lint.mccabe]
max-complexity = 10

[lint.flake8-quotes]
inline-quotes = "single"

[lint.flake8-annotations]
suppress-dummy-args = true
mypy-init-return = true

[lint.flake8-builtins]
builtins-ignorelist = ["id", "type", "all"]
